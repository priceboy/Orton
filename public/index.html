<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flight Manager</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 40px;
}

h1, h2 {
    color: #38bdf8;
}

input, button {
    padding: 12px;
    margin: 8px 0;
    width: 100%;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

button {
    background: #22c55e;
    color: white;
    cursor: pointer;
}

.card {
    background: #1e293b;
    padding: 15px;
    margin-top: 10px;
    border-radius: 10px;
}

.highlight {
    color: #38bdf8;
}
</style>
</head>

<body>

<h1>✈️ Flight Manager</h1>

<!-- ================= UPLOAD ================= -->
<h2>Upload Ticket</h2>

<form id="form">
  <input type="file" name="ticket" required>
  <input type="text" name="phone" placeholder="Phone" required>
  <input type="text" name="reference" placeholder="Reference" required>
  <button type="submit">Upload Ticket</button>
</form>

<div id="uploadStatus"></div>

<hr>

<!-- ================= SEARCH ================= -->
<h2>Search Tickets</h2>

<input id="search" placeholder="Search name, phone, airport..." />

<div id="results"></div>

<script>
// ================= UPLOAD =================
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const status = document.getElementById("uploadStatus");
  status.innerHTML = "Uploading...";

  const formData = new FormData(e.target);

  try {
    const res = await fetch("/upload", {
      method: "POST",
      body: formData
    });

    const text = await res.text();

    status.innerHTML = "✅ " + text;
    e.target.reset();

  } catch (err) {
    console.error(err);
    status.innerHTML = "❌ Upload failed";
  }
});


// ================= SEARCH =================
document.getElementById("search").addEventListener("input", async (e) => {
  const query = e.target.value;

  if (!query) {
    document.getElementById("results").innerHTML = "";
    return;
  }

  try {
    const res = await fetch(`/search?q=${query}`);
    const data = await res.json();

    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    if (data.length === 0) {
        resultsDiv.innerHTML = "<p>No results found</p>";
        return;
    }

    data.forEach(ticket => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <b>${ticket.customer_name || "Unknown"}</b><br>
        📞 ${ticket.phone}<br>
        ✈️ ${ticket.departure_airport} → ${ticket.arrival_airport}<br>
        🛫 ${ticket.departure_time || "N/A"}<br>
        🧾 Ref: ${ticket.reference}<br>
        🧭 Flight: ${ticket.flight_number || "N/A"}
      `;

      resultsDiv.appendChild(card);
    });

  } catch (err) {
    console.error(err);
  }
});
</script>

</body>
</html>
