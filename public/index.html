<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Flight Manager</title>

<style>

body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    margin:0;
    padding:30px;
}

h1,h2,h3{
    color:#38bdf8;
}

input,
button,
textarea{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-size:15px;
    box-sizing:border-box;
}

button{
    background:#22c55e;
    color:white;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

button:hover{
    opacity:0.9;
    transform:scale(1.01);
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:16px;
    margin-top:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.ticketCard{
    cursor:pointer;
    transition:0.2s;
}

.ticketCard:hover{
    transform:scale(1.02);
    border:1px solid #38bdf8;
}

.selected{
    border:2px solid #22c55e;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.leftPanel{
    overflow-y:auto;
    max-height:80vh;
}

.rightPanel{
    position:sticky;
    top:20px;
    height:fit-content;
}

.highlight{
    color:#38bdf8;
    font-weight:bold;
}

.small{
    color:#94a3b8;
    font-size:14px;
}

textarea{
    background:#0f172a;
    color:white;
    min-height:320px;
    resize:vertical;
    border:1px solid #334155;
}

hr{
    margin:30px 0;
    border:1px solid #334155;
}

.empty{
    opacity:0.7;
    text-align:center;
    padding:40px;
}

.statusSuccess{
    color:#22c55e;
    margin-top:10px;
}

.statusError{
    color:#ef4444;
    margin-top:10px;
}

.route{
    font-size:18px;
    font-weight:bold;
}

.expiredBadge{
    background:#ef4444;
    color:white;
    padding:6px 10px;
    border-radius:8px;
    display:inline-block;
    margin-top:10px;
    font-size:13px;
    font-weight:bold;
}

.returnBadge{
    background:#2563eb;
    color:white;
    padding:6px 10px;
    border-radius:8px;
    display:inline-block;
    margin-top:10px;
    margin-left:10px;
    font-size:13px;
    font-weight:bold;
}

.warningPopup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.warningBox{
    background:#7f1d1d;
    border:4px solid #ef4444;
    padding:40px;
    border-radius:20px;
    width:520px;
    text-align:center;
    box-shadow:0 0 40px rgba(239,68,68,0.7);
    animation:pulse 1s infinite;
}

.warningTitle{
    font-size:32px;
    color:#fecaca;
    margin-bottom:20px;
    font-weight:bold;
}

.warningText{
    font-size:18px;
    line-height:1.7;
}

.closeWarning{
    margin-top:25px;
    background:#ef4444;
    font-size:18px;
}

@keyframes pulse{
    0%{ transform:scale(1); }
    50%{ transform:scale(1.03); }
    100%{ transform:scale(1); }
}

</style>
</head>

<body>

<h1>✈️ Flight Manager Dashboard</h1>

<!-- WARNING POPUP -->

<div id="warningPopup" class="warningPopup">

    <div class="warningBox">

        <div class="warningTitle">
            ⚠️ OUTDATED TICKET
        </div>

        <div id="warningMessage" class="warningText"></div>

        <button
        class="closeWarning"
        onclick="closeWarning()">
            I Understand
        </button>

    </div>

</div>

<!-- UPLOAD -->

<div class="card">

<h2>Upload Ticket</h2>

<form id="form">

<input
type="file"
name="ticket"
required
>

<input
type="text"
name="phone"
placeholder="Customer Phone"
required
>

<input
type="text"
name="reference"
placeholder="Booking Reference"
required
>

<button type="submit">
Upload Ticket
</button>

</form>

<div id="uploadStatus"></div>

</div>

<hr>

<!-- SEARCH -->

<h2>Search Tickets</h2>

<input
id="search"
placeholder="Search passenger, airport, phone, reference..."
>

<br><br>

<div class="grid">

<div
id="results"
class="leftPanel"
></div>

<div
id="preview"
class="rightPanel"
>

<div class="card empty">

<h2>No Ticket Selected</h2>

<p>
Search and click a ticket to inspect full details.
</p>

</div>

</div>

</div>

<script>

// ================= DATE PARSER =================

function parseCustomDate(dateString){

    if(!dateString) return null;

    let normalDate = new Date(dateString);

    if(!isNaN(normalDate)){
        return normalDate;
    }

    const months = {
        JAN:0,FEB:1,MAR:2,APR:3,
        MAY:4,JUN:5,JUL:6,AUG:7,
        SEP:8,OCT:9,NOV:10,DEC:11
    };

    const match =
    dateString.match(/(\d{1,2})\s([A-Z]{3})\s(\d{4})/i);

    if(match){

        const day = parseInt(match[1]);
        const month = months[match[2].toUpperCase()];
        const year = parseInt(match[3]);

        return new Date(year, month, day);
    }

    return null;
}

// ================= WARNING =================

function closeWarning(){

    document
    .getElementById("warningPopup")
    .style.display = "none";
}

function isExpired(dateString){

    if(!dateString) return false;

    const depDate =
    parseCustomDate(dateString);

    if(!depDate) return false;

    const today = new Date();

    today.setHours(0,0,0,0);
    depDate.setHours(0,0,0,0);

    return depDate < today;
}

function checkIfTicketExpired(ticket){

    const outboundExpired =
    isExpired(ticket.departure_date);

    const returnExpired =
    isExpired(ticket.return_departure_date);

    if(outboundExpired || returnExpired){

        document
        .getElementById("warningPopup")
        .style.display = "flex";

        document
        .getElementById("warningMessage")
        .innerHTML = `

        This ticket contains outdated flight dates.

        <br><br>

        <b>Passenger:</b>
        ${ticket.customer_name}

        <br><br>

        <b>Outbound:</b>
        ${ticket.departure_date || "N/A"}

        <br><br>

        <b>Return:</b>
        ${ticket.return_departure_date || "N/A"}

        <br><br>

        Please verify carefully before
        sending reminders.
        `;
    }
}

// ================= UPLOAD =================

document
.getElementById("form")
.addEventListener("submit", async (e) => {

    e.preventDefault();

    const status =
    document.getElementById("uploadStatus");

    status.innerHTML =
    "Uploading ticket...";

    const formData =
    new FormData(e.target);

    try{

        const res =
        await fetch("/upload",{
            method:"POST",
            body:formData
        });

        const text =
        await res.text();

        status.innerHTML =
        `<div class="statusSuccess">✅ ${text}</div>`;

        e.target.reset();

    }catch(err){

        console.error(err);

        status.innerHTML =
        `<div class="statusError">❌ Upload failed</div>`;
    }
});

// ================= SEARCH =================

document
.getElementById("search")
.addEventListener("input", async (e) => {

    const query = e.target.value;

    const resultsDiv =
    document.getElementById("results");

    const preview =
    document.getElementById("preview");

    if(!query.trim()){

        resultsDiv.innerHTML = "";
        return;
    }

    try{

        const res =
        await fetch(`/search?q=${query}`);

        const data =
        await res.json();

        resultsDiv.innerHTML = "";

        if(data.length === 0){

            resultsDiv.innerHTML = `
            <div class="card">
                No tickets found
            </div>
            `;

            return;
        }

        data.forEach(ticket => {

            const expired =
            isExpired(ticket.departure_date);

            const card =
            document.createElement("div");

            card.className =
            "card ticketCard";

            card.innerHTML = `

            <h3>
                ${ticket.customer_name || "Unknown Passenger"}
            </h3>

            <p>
                📞 ${ticket.phone || "N/A"}
            </p>

            <p class="route">
                ✈️
                ${ticket.departure_airport || "N/A"}
                →
                ${ticket.arrival_airport || "N/A"}
            </p>

            <p>
                📅 ${ticket.departure_date || "No Date"}
            </p>

            ${expired ? `
            <div class="expiredBadge">
            ⚠ EXPIRED
            </div>
            ` : ""}

            ${ticket.trip_type === "ROUND_TRIP" ? `
            <div class="returnBadge">
            🔁 RETURN TRIP
            </div>
            ` : ""}

            `;

    card.addEventListener("click", () => {

    checkIfTicketExpired(ticket);

    document
    .querySelectorAll(".ticketCard")
    .forEach(c => {
        c.classList.remove("selected");
    });

    card.classList.add("selected");

    // =====================================
    // ✅ OUTBOUND MESSAGE
    // =====================================

    const outboundMessage = `

━━━━━━━━━━━━━━━
OUTBOUND FLIGHT
━━━━━━━━━━━━━━━

🛫 Route:
${ticket.departure_airport || "N/A"} → ${ticket.arrival_airport || "N/A"}

📅 Departure Date:
${ticket.departure_date || "N/A"}

⏰ Departure Time:
${ticket.departure_time || "N/A"}

🧾 Flight Number:
${ticket.flight_number || "N/A"}

🛄 Check-In Time:
${ticket.checkin_time || "N/A"}

`;

    // =====================================
    // ✅ RETURN MESSAGE
    // =====================================

    const returnMessage =
    ticket.trip_type === "ROUND_TRIP"

    ? `

━━━━━━━━━━━━━━━
RETURN FLIGHT
━━━━━━━━━━━━━━━

🛫 Route:
${ticket.return_departure_airport || "N/A"} → ${ticket.return_arrival_airport || "N/A"}

📅 Return Date:
${ticket.return_departure_date || "N/A"}

⏰ Return Time:
${ticket.return_departure_time || "N/A"}

🧾 Flight Number:
${ticket.return_flight_number || "N/A"}

🛄 Check-In Time:
${ticket.return_checkin_time || "N/A"}

`

    : "";

    // =====================================
    // ✅ FINAL WHATSAPP MESSAGE
    // =====================================

    const whatsappMessage = `✈️ Flight Reminder

Dear ${ticket.customer_name || "Customer"},

This is a reminder regarding your upcoming flight.

${outboundMessage}

${returnMessage}

━━━━━━━━━━━━━━━

🧾 Booking Reference:
${ticket.reference || "N/A"}

Safe travels ✈️`;

    // =====================================
    // ✅ PREVIEW PANEL
    // =====================================

    preview.innerHTML = `

    <div class="card">

        <h2>
            ${ticket.customer_name || "Unknown Passenger"}
        </h2>

        <p>
            <span class="highlight">
            📞 Phone:
            </span>
            ${ticket.phone || "N/A"}
        </p>

        <p>
            <span class="highlight">
            🧾 Booking Reference:
            </span>
            ${ticket.reference || "N/A"}
        </p>

        <hr>

        <h3>🛫 Outbound Flight</h3>

        <p>
            ✈️
            ${ticket.departure_airport || "N/A"}
            →
            ${ticket.arrival_airport || "N/A"}
        </p>

        <p>
            📅 ${ticket.departure_date || "N/A"}
        </p>

        <p>
            ⏰ ${ticket.departure_time || "N/A"}
        </p>

        <p>
            🧾 Flight:
            ${ticket.flight_number || "N/A"}
        </p>

        <p>
            🛄 Check-In:
            ${ticket.checkin_time || "N/A"}
        </p>

        ${ticket.trip_type === "ROUND_TRIP" ? `

        <hr>

        <h3>🔁 Return Flight</h3>

        <p>
            ✈️
            ${ticket.return_departure_airport || "N/A"}
            →
            ${ticket.return_arrival_airport || "N/A"}
        </p>

        <p>
            📅 ${ticket.return_departure_date || "N/A"}
        </p>

        <p>
            ⏰ ${ticket.return_departure_time || "N/A"}
        </p>

        <p>
            🧾 Flight:
            ${ticket.return_flight_number || "N/A"}
        </p>

        <p>
            🛄 Check-In:
            ${ticket.return_checkin_time || "N/A"}
        </p>

        ` : ""}

        <hr>

        <textarea
        id="messageBox"
        >${whatsappMessage}</textarea>

        <br>

        <button id="sendBtn">
            Send To Customer
        </button>

    </div>
    `;

    // =====================================
    // ✅ WHATSAPP BUTTON
    // =====================================

    document
    .getElementById("sendBtn")
    .addEventListener("click", () => {

        const editedMessage =
        document
        .getElementById("messageBox")
        .value;

        const cleanPhone =
        (ticket.phone || "")
        .replace(/\+/g,"")
        .replace(/\s/g,"");

        const finalLink =

`https://wa.me/${cleanPhone}?text=${encodeURIComponent(editedMessage)}`;

        window.open(
            finalLink,
            "_blank"
        );
    });
});

            resultsDiv.appendChild(card);
        });

    }catch(err){

        console.error(err);
    }
});

</script>

</body>
</html>
