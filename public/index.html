<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Flight Manager</title>

<style>

body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    margin:0;
    padding:30px;
}

h1,h2,h3{
    color:#38bdf8;
}

input,
button,
textarea{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-size:15px;
    box-sizing:border-box;
}

button{
    background:#22c55e;
    color:white;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

button:hover{
    opacity:0.9;
    transform:scale(1.01);
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:16px;
    margin-top:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.ticketCard{
    cursor:pointer;
    transition:0.2s;
}

.ticketCard:hover{
    transform:scale(1.02);
    border:1px solid #38bdf8;
}

.selected{
    border:2px solid #22c55e;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.leftPanel{
    overflow-y:auto;
    max-height:80vh;
}

.rightPanel{
    position:sticky;
    top:20px;
    height:fit-content;
}

.highlight{
    color:#38bdf8;
    font-weight:bold;
}

.small{
    color:#94a3b8;
    font-size:14px;
}

textarea{
    background:#0f172a;
    color:white;
    min-height:280px;
    resize:vertical;
    border:1px solid #334155;
}

hr{
    margin:40px 0;
    border:1px solid #334155;
}

.empty{
    opacity:0.7;
    text-align:center;
    padding:40px;
}

.statusSuccess{
    color:#22c55e;
    margin-top:10px;
}

.statusError{
    color:#ef4444;
    margin-top:10px;
}

.route{
    font-size:18px;
    font-weight:bold;
}

.expiredBadge{
    background:#ef4444;
    color:white;
    padding:6px 10px;
    border-radius:8px;
    display:inline-block;
    margin-top:10px;
    font-size:13px;
    font-weight:bold;
}

.warningPopup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.warningBox{
    background:#7f1d1d;
    border:4px solid #ef4444;
    padding:40px;
    border-radius:20px;
    width:500px;
    text-align:center;
    box-shadow:0 0 40px rgba(239,68,68,0.7);
    animation:pulse 1s infinite;
}

.warningTitle{
    font-size:32px;
    color:#fecaca;
    margin-bottom:20px;
    font-weight:bold;
}

.warningText{
    font-size:18px;
    line-height:1.7;
}

.closeWarning{
    margin-top:25px;
    background:#ef4444;
    font-size:18px;
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.03);
    }

    100%{
        transform:scale(1);
    }
}

</style>
</head>

<body>

<h1>✈️ Flight Manager Dashboard</h1>

<!-- ================= WARNING POPUP ================= -->

<div
id="warningPopup"
class="warningPopup"
>

<div class="warningBox">

<div class="warningTitle">
⚠️ OUTDATED TICKET
</div>

<div
id="warningMessage"
class="warningText"
></div>

<button
class="closeWarning"
onclick="closeWarning()"
>
I Understand
</button>

</div>

</div>

<!-- ================= UPLOAD ================= -->

<div class="card">

<h2>Upload Ticket</h2>

<form id="form">

<input
type="file"
name="ticket"
required
>

<input
type="text"
name="phone"
placeholder="Customer Phone"
required
>

<input
type="text"
name="reference"
placeholder="Booking Reference"
required
>

<button type="submit">
Upload Ticket
</button>

</form>

<div id="uploadStatus"></div>

</div>

<hr>

<!-- ================= SEARCH ================= -->

<h2>Search Tickets</h2>

<input
id="search"
placeholder="Search passenger, airport, phone, reference..."
>

<br><br>

<div class="grid">

<div
id="results"
class="leftPanel"
></div>

<div
id="preview"
class="rightPanel"
>

<div class="card empty">

<h2>No Ticket Selected</h2>

<p>
Search and click a ticket to inspect full details.
</p>

</div>

</div>

</div>

<script>

// ================= WARNING SYSTEM =================

function closeWarning(){

    document
    .getElementById("warningPopup")
    .style.display = "none";

}

function isExpired(dateString){

    if(!dateString) return false;

    const today = new Date();

    const depDate = new Date(dateString);

    today.setHours(0,0,0,0);
    depDate.setHours(0,0,0,0);

    return depDate < today;
}

function checkIfTicketExpired(ticket){

    if(!ticket.departure_date) return;

    if(isExpired(ticket.departure_date)){

        document
        .getElementById("warningPopup")
        .style.display = "flex";

        document
        .getElementById("warningMessage")
        .innerHTML = `

        This ticket appears to be outdated.

        <br><br>

        <b>Passenger:</b>
        ${ticket.customer_name}

        <br><br>

        <b>Departure Date:</b>
        ${ticket.departure_date}

        <br><br>

        Please verify carefully before
        sending reminders to the customer.
        `;
    }

}

// ================= UPLOAD =================

document
.getElementById("form")
.addEventListener("submit", async (e) => {

    e.preventDefault();

    const status =
    document.getElementById("uploadStatus");

    status.innerHTML =
    "Uploading ticket...";

    const formData =
    new FormData(e.target);

    try{

        const res =
        await fetch("/upload",{
            method:"POST",
            body:formData
        });

        const text =
        await res.text();

        status.innerHTML =
        `<div class="statusSuccess">✅ ${text}</div>`;

        e.target.reset();

    }catch(err){

        console.error(err);

        status.innerHTML =
        `<div class="statusError">❌ Upload failed</div>`;

    }

});

// ================= SEARCH =================

document
.getElementById("search")
.addEventListener("input", async (e) => {

    const query = e.target.value;

    const resultsDiv =
    document.getElementById("results");

    const preview =
    document.getElementById("preview");

    if(!query.trim()){

        resultsDiv.innerHTML = "";

        return;
    }

    try{

        const res =
        await fetch(`/search?q=${query}`);

        const data =
        await res.json();

        resultsDiv.innerHTML = "";

        if(data.length === 0){

            resultsDiv.innerHTML = `
            <div class="card">
                No tickets found
            </div>
            `;

            return;
        }

        data.forEach(ticket => {

            const expired =
            isExpired(ticket.departure_date);

            const card =
            document.createElement("div");

            card.className =
            "card ticketCard";

            card.innerHTML = `

            <h3>
                ${ticket.customer_name || "Unknown Passenger"}
            </h3>

            <p>
                📞 ${ticket.phone || "N/A"}
            </p>

            <p class="route">
                ✈️
                ${ticket.departure_airport || "N/A"}
                →
                ${ticket.arrival_airport || "N/A"}
            </p>

            <p>
                🧭 Flight:
                ${ticket.flight_number || "N/A"}
            </p>

            <p>
                📅 ${ticket.departure_date || "No Date"}
            </p>

            ${expired ? `
            <div class="expiredBadge">
            ⚠ EXPIRED TICKET
            </div>
            ` : ""}

            <p class="small">
                Click to inspect full ticket
            </p>

            `;

            card.addEventListener("click", () => {

                checkIfTicketExpired(ticket);

                document
                .querySelectorAll(".ticketCard")
                .forEach(c => {
                    c.classList.remove("selected");
                });

                card.classList.add("selected");

                const whatsappMessage =

`✈️ Flight Reminder

Dear ${ticket.customer_name},

We hope you're doing well.

This is a friendly reminder regarding your upcoming flight scheduled for ${ticket.departure_date || "your travel date"}.

━━━━━━━━━━━━━━━
FLIGHT DETAILS
━━━━━━━━━━━━━━━

🛫 Route:
${ticket.departure_airport} → ${ticket.arrival_airport}

🧭 Flight Number:
${ticket.flight_number || "N/A"}

📅 Departure Date:
${ticket.departure_date || "N/A"}

⏰ Departure Time:
${ticket.departure_time || "N/A"}

⌛ Recommended Check-In Time:
${ticket.checkin_time || "N/A"}

🧾 Booking Reference:
${ticket.reference || "N/A"}

🧳 Cabin Luggage:
${ticket.cabin_luggage || "N/A"}

🛄 Checked Luggage:
${ticket.checked_luggage || "N/A"}

━━━━━━━━━━━━━━━

Please ensure you arrive at the airport early enough for check-in and security procedures.

Thank you for choosing us and we wish you a safe and pleasant journey ✈️`;

                preview.innerHTML = `

                <div class="card">

                <h2>
                    ${ticket.customer_name}
                </h2>

                <p>
                    <span class="highlight">
                    📞 Phone:
                    </span>
                    ${ticket.phone || "N/A"}
                </p>

                <p>
                    <span class="highlight">
                    🧾 Booking Reference:
                    </span>
                    ${ticket.reference || "N/A"}
                </p>

                <p>
                    <span class="highlight">
                    ✈️ Route:
                    </span>
                    ${ticket.departure_airport}
                    →
                    ${ticket.arrival_airport}
                </p>

                <p>
                    <span class="highlight">
                    🧭 Flight Number:
                    </span>
                    ${ticket.flight_number || "N/A"}
                </p>

                <p>
                    <span class="highlight">
                    📅 Departure Date:
                    </span>
                    ${ticket.departure_date || "N/A"}
                </p>

                <p>
                    <span class="highlight">
                    🛫 Departure Time:
                    </span>
                    ${ticket.departure_time || "N/A"}
                </p>

                <p>
                    <span class="highlight">
                    ⏰ Check-In Time:
                    </span>
                    ${ticket.checkin_time || "N/A"}
                </p>

                <p>
                    <span class="highlight">
                    🧳 Cabin Luggage:
                    </span>
                    ${ticket.cabin_luggage || "N/A"}
                </p>

                <p>
                    <span class="highlight">
                    🛄 Checked Luggage:
                    </span>
                    ${ticket.checked_luggage || "N/A"}
                </p>

                <p>
                    <span class="highlight">
                    🔁 Trip Type:
                    </span>
                    ${ticket.trip_type || "N/A"}
                </p>

                <hr>

                <h3>
                    WhatsApp Message Preview
                </h3>

                <textarea
                id="messageBox"
                >${whatsappMessage}</textarea>

                <br>

                <button id="generateBtn">
                    Generate WhatsApp Message
                </button>

                <br>

                <button id="sendBtn">
                    Send To Customer
                </button>

                </div>

                `;

                document
                .getElementById("generateBtn")
                .addEventListener("click", () => {

                    alert(
                        "✅ WhatsApp message generated successfully."
                    );

                });

                document
                .getElementById("sendBtn")
                .addEventListener("click", () => {

                    const editedMessage =
                    document
                    .getElementById("messageBox")
                    .value;

                    const cleanPhone =
                    (ticket.phone || "")
                    .replace(/\+/g,"")
                    .replace(/\s/g,"");

                    const finalLink =

`https://wa.me/${cleanPhone}?text=${encodeURIComponent(editedMessage)}`;

                    window.open(
                        finalLink,
                        "_blank"
                    );

                });

            });

            resultsDiv.appendChild(card);

        });

    }catch(err){

        console.error(err);

    }

});

</script>

</body>
</html>
